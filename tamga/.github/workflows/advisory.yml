name: Security Advisory

# Publishes GitHub Security Advisories (GHSA) when a security-related
# PR is merged. Uses the PR body as the advisory description.
#
# EU CRA Article 11(5): structured machine-readable vulnerability advisories.

on:
  push:
    branches: [main, dev]
    paths:
      - "proxy/**"
      - "analyzer/**"
      - "dashboard/**"
      - "deploy/**"
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "proxy/**"
      - "analyzer/**"
      - "dashboard/**"

jobs:
  # Validate that security-impacting changes have advisory context.
  # Does NOT block merge; adds a status check that reviewers can see.
  advisory-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Check for security impact markers
        id: check
        run: |
          # Look for security impact in PR body or commit messages.
          # This is advisory — it flags PRs that should have a GHSA.
          COMMITS=$(git log --format=%B ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git log --format=%B -1 || echo "")
          PR_BODY="${{ github.event.pull_request.body }}"

          HAS_SECURITY="false"
          if echo "$COMMITS" | grep -qiE "(security|vuln|CVE|exploit|injection|bypass|leak|advisory)"; then
            HAS_SECURITY="true"
          fi
          if echo "$PR_BODY" | grep -qiE "(security|vuln|CVE|exploit)"; then
            HAS_SECURITY="true"
          fi

          echo "has_security_impact=$HAS_SECURITY" >> $GITHUB_OUTPUT
          if [ "$HAS_SECURITY" = "true" ]; then
            echo "::warning::Security-impacting changes detected — consider creating a GitHub Security Advisory (GHSA)"
          else
            echo "No security impact markers found."
          fi

      - name: Reminder for advisory creation
        if: steps.check.outputs.has_security_impact == 'true'
        run: |
          echo "## Security Advisory Reminder" >> $GITHUB_STEP_SUMMARY
          echo "This PR contains security-relevant changes." >> $GITHUB_STEP_SUMMARY
          echo "Please create a GitHub Security Advisory at:" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/security/advisories/new" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See docs/ENISA_VULNERABILITY_DISCLOSURE.md for the full procedure." >> $GITHUB_STEP_SUMMARY

  # Dependency vulnerability scan — alerts on known CVEs in go.sum / package-lock.json
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy filesystem scan
        run: |
          trivy fs --severity CRITICAL,HIGH --format sarif --output trivy-results.sarif . || true
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
