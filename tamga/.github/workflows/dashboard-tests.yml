name: Dashboard Tests

on:
  pull_request:
    paths:
      - "dashboard/**"
  push:
    branches: [main, dev]
    paths:
      - "dashboard/**"

jobs:
  api-types-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate API types from OpenAPI spec
        run: npm run gen:api-types

      - name: Check for drifts against committed types
        run: |
          if ! git diff --exit-code lib/api-types.generated.ts; then
            echo ""
            echo "✗ API types are out of sync with the OpenAPI spec."
            echo "  Run 'npm run gen:api-types' locally and commit the result."
            exit 1
          fi

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npx next build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start production server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null && echo "Server ready" && break
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7
