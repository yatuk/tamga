syntax = "proto3";

package proto.analyzer.v1;

option go_package = "github.com/yatuk/tamga/proto/analyzer/v1;analyzerv1";

// ── AnalyzerService ─────────────────────────────────────────────────────────
// Deep semantic NLP analysis for LLM security scanning.
//
// Called by the Go proxy AFTER static regex scanning completes. The Go proxy
// has already detected and redacted/blocked based on regex patterns. This
// service provides the ML/NLP layer: Presidio spaCy NER, Claude Haiku judge,
// and LLM Guard ML classifiers.

service AnalyzerService {
  // Analyze runs deep semantic analysis on content that has already passed
  // the Go proxy's static regex scanners. Returns only NLP/ML findings.
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse);

  // HealthCheck returns service health status (standard gRPC health probe).
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ── Request ──────────────────────────────────────────────────────────────────

message AnalyzeRequest {
  // Unique request identifier propagated from the proxy (UUID).
  string request_id = 1;

  // The text content to analyze (prompt or response body).
  string content = 2;

  // Which scanner types to run: "pii", "injection", "toxicity".
  // The Go proxy selects these based on input risk score.
  repeated string scan_types = 3;

  // LLM provider and model (e.g. "openai", "gpt-4o-mini").
  string provider = 4;
  string model = 5;

  // Opaque metadata forwarded from the proxy (org_id, action, endpoint,
  // direction, input_risk, etc.).
  map<string, string> metadata = 6;

  // Set by the Go proxy; text has already passed static regex scan.
  bool pre_scanned = 7;
}

// ── Response ─────────────────────────────────────────────────────────────────

message AnalyzeResponse {
  string request_id = 1;

  // Aggregated findings from all scanners.
  repeated Finding findings = 2;

  // End-to-end wall-clock duration in milliseconds.
  double duration_ms = 3;

  // Per-scanner results for observability (duration, count per scanner).
  repeated ScannerResult scanner_results = 4;
}

// ── Common types ─────────────────────────────────────────────────────────────

message Finding {
  // Finding type: "pii", "injection", "toxicity".
  string type = 1;

  // Entity/technique category (e.g. "PERSON", "ignore_prev", "toxicity").
  string category = 2;

  // Severity level: "critical", "high", "medium", "low".
  string severity = 3;

  // Truncated match excerpt for logging/audit (≤200 chars).
  string match = 4;

  // Confidence score 0.0–1.0.
  double confidence = 5;
}

message ScannerResult {
  // Scanner name (e.g. "pii_deep", "injection_llm", "toxicity").
  string scanner = 1;

  // Findings produced by this scanner.
  repeated Finding findings = 2;

  // Scanner execution time in milliseconds.
  double duration_ms = 3;
}

// ── Health ───────────────────────────────────────────────────────────────────

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;   // "ok" when healthy
  string service = 2;  // "tamga-analyzer"
}
