name: Adversarial & Load Regression Gate

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "proxy/**"
      - "analyzer/**"
      - "deploy/docker-compose.yml"
      - "tests/stress/**"
      - ".github/workflows/adversarial-gate.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: adversarial-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stress-suite:
    name: Stress Suite (adversarial + load)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      docker:
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: proxy/go.sum

      - name: Install k6
        run: |
          if command -v k6 &>/dev/null; then
            echo "k6 already installed: $(k6 version)"
            exit 0
          fi
          # Try official apt repo
          if ! sudo gpg --no-tty --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 2>/dev/null; then
            echo "GPG key fetch failed, falling back to binary download"
            K6_VER="0.51.0"
            curl -sSfL "https://github.com/grafana/k6/releases/download/v${K6_VER}/k6-v${K6_VER}-linux-amd64.tar.gz" -o /tmp/k6.tar.gz
            sudo tar xzf /tmp/k6.tar.gz -C /usr/local/bin --strip-components=1
          else
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update -qq && sudo apt-get install -yqq k6
          fi
          k6 version

      - name: Build images
        run: |
          cd "$GITHUB_WORKSPACE"
          docker compose -f deploy/docker-compose.yml build --quiet 2>&1 || true

      - name: Run stress suite
        id: stress
        run: |
          chmod +x tests/stress/run_stress_suite.sh
          ./tests/stress/run_stress_suite.sh
        env:
          TAMGA_HEALTH_TIMEOUT: "90"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-results-${{ github.run_id }}
          path: tests/stress/results/
          retention-days: 30
          if-no-files-found: warn

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            // Find the latest results directory
            const resultsBase = "tests/stress/results";
            let latestDir = "";
            if (fs.existsSync(resultsBase)) {
              const dirs = fs.readdirSync(resultsBase)
                .filter(d => fs.statSync(path.join(resultsBase, d)).isDirectory())
                .sort()
                .reverse();
              if (dirs.length > 0) latestDir = path.join(resultsBase, dirs[0]);
            }

            let body = "## 🛡️ Adversarial & Load Regression Gate\n\n";

            if (process.env.STRESS_EXIT_CODE === "0" || !process.env.STRESS_EXIT_CODE) {
              body += "**Status:** ✅ Passed — no regression detected\n\n";
            } else {
              body += "**Status:** ❌ Failed — regression detected\n\n";
            }

            body += `Results directory: \`${latestDir || "N/A"}\`\n`;
            body += `[Download artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;

            // Try to read adversarial summary
            const advFile = path.join(latestDir, "adversarial_results.json");
            if (fs.existsSync(advFile)) {
              const adv = JSON.parse(fs.readFileSync(advFile, "utf8"));
              body += "\n### Adversarial Bypass Summary\n";
              body += "| Category | Detected | Bypassed |\n";
              body += "|----------|----------|----------|\n";
              for (const [cat, data] of Object.entries(adv)) {
                if (cat === "total_bypassed") continue;
                body += `| ${cat} | ${data.detected} | ${data.bypassed} |\n`;
              }
              body += `| **TOTAL** | — | **${adv.total_bypassed}** |\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
        env:
          STRESS_EXIT_CODE: ${{ steps.stress.outcome == 'success' && '0' || '1' }}
