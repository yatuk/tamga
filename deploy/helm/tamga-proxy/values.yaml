image:
  repository: ghcr.io/yatuk/tamga
  tag: "0.7.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 2

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tamga.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env:
  TAMGA_ADMIN_KEY: "change-me"
  TAMGA_LOG_LEVEL: "info"
  TAMGA_POLICY_FILE: "/etc/tamga/policy.yaml"
  TAMGA_TLS_CERT: ""
  TAMGA_TLS_KEY: ""
  TAMGA_MTLS_CLIENT_CA: ""
  TAMGA_POSTGRES_URL: ""
  TAMGA_REDIS_URL: ""
  TAMGA_OTEL_ENDPOINT: ""

policy:
  inline: |
    version: "1"
    name: default-tr
    rules:
      pii_tckn:
        scanner: pii
        action: redact
      pii_iban:
        scanner: pii
        action: redact
      secrets:
        scanner: secrets
        action: block
      jailbreak:
        scanner: jailbreak
        action: block
    data:
      residency: "tr"
      retention_days: 30
    cost:
      max_tokens_per_day: 10000000
      max_cost_usd_per_day: 500

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
  allowedNamespaces: []
