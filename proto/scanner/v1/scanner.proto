syntax = "proto3";

package tamga.scanner.v1;

option go_package = "github.com/yatuk/tamga/proto/scanner/v1;scannerv1";

// ScannerService provides content scanning for PII, secrets, injection,
// jailbreak, content moderation, competitor, and custom entity detection.
service ScannerService {
    // Scan runs the full scanner pipeline on the given content and returns
    // all findings. The pipeline mode controls execution strategy.
    rpc Scan(ScanRequest) returns (ScanResponse);

    // HealthCheck probes the scanner service for readiness.
    rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message ScanRequest {
    // request_id correlates this scan with the proxy request.
    string request_id = 1;
    // content is the raw request body to scan.
    bytes content = 2;
    // enabled_scanners restricts which scanners run. Empty means all registered.
    repeated string enabled_scanners = 3;
    // pipeline_mode selects execution strategy: "adaptive", "sync", "async", or "workerpool".
    string pipeline_mode = 4;
    // metadata carries optional key-value pairs (e.g. trace context).
    map<string, string> metadata = 5;
}

message ScanResponse {
    string request_id = 1;
    repeated Finding findings = 2;
    // scanner_results maps scanner name → per-scanner outcome.
    map<string, ScannerResult> scanner_results = 3;
    // duration_ms is the total scan phase wall-clock time in milliseconds.
    double duration_ms = 4;
}

// Finding represents a single security detection, mirroring the Go Finding
// struct at proxy/internal/scanner/scanner.go:10.
message Finding {
    string type = 1;
    string severity = 2;
    string match = 3;
    string category = 4;
    int32 start_pos = 5;
    int32 end_pos = 6;
    double confidence = 7;
    string action_taken = 8;
    map<string, string> metadata = 9;
    string scanner_version = 10;
    string dataset_version = 11;
}

// ScannerResult captures per-scanner execution outcome.
message ScannerResult {
    // succeeded is true when the scanner ran without error.
    bool succeeded = 1;
    // error contains the error message when succeeded is false.
    string error = 2;
    // duration_ms is the wall-clock time for this specific scanner.
    double duration_ms = 3;
    // finding_count is how many findings this scanner produced.
    int32 finding_count = 4;
}

message HealthRequest {}

message HealthResponse {
    string status = 1;   // "SERVING" | "NOT_SERVING"
    string service = 2;  // "tamga-scanner"
}
